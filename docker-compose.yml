services:
  labelmaker:
    build:
      context: .
      # Override PTOUCH_PRINT_GIT to point at a different ptouch-print fork if needed.
      # args:
      #   PTOUCH_PRINT_GIT: https://github.com/danhoban/ptouch-print.git
      #   PTOUCH_PRINT_REF: master
    image: ptouch-labelmaker:local
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      # HOMEBOX_URL: http://homebox.example:7745
      # HOMEBOX_USER: you@example.com
      # HOMEBOX_PASSWORD: changeme
    env_file:
      - path: .env
        required: false
    volumes:
      - ./label_store:/app/label_store
    # USB passthrough is required to print. Supported platforms:
    #   • Linux  — works out of the box via /dev/bus/usb
    #   • Windows — Docker Desktop + usbipd-win (https://github.com/dorssel/usbipd-win).
    #              Attach the printer from an admin shell before starting the container:
    #                usbipd list
    #                usbipd bind  --busid <BUSID>
    #                usbipd attach --wsl --busid <BUSID>
    # macOS is not supported: Docker Desktop for Mac cannot forward USB into containers.
    devices:
      - /dev/bus/usb:/dev/bus/usb
